name: Build ArmorStand and BlazeRod
on: [pull_request, push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r28b
      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.14.0
      - name: Build
        run: |
          bazel build \
            -c opt \
            --verbose_failures \
            //armorstand:mod_fabric \
            //armorstand:mod_neoforge \
            //blazerod:blazerod_fabric \
            //blazerod:blazerod_neoforge \
            //blazerod/model/model-base \
            //blazerod/model/model-formats \
            //blazerod/model/model-gltf \
            //blazerod/model/model-pmd \
            //blazerod/model/model-pmx \
            //blazerod/model/model-vmd \
            //blazerod/model/model-assimp:model-assimp-merged \
            //blazerod/example/ball_block
      - name: Test
        run: |
          bazel test \
            --verbose_failures \
            //blazerod/model:test \
            //blazerod/render:test
      - name: Package artifacts
        run: |
          mkdir -p dist
          BAZEL_BIN=$(bazel info bazel-bin -c opt)
          echo "Bazel Bin: $BAZEL_BIN"
          
          # Copy main mods
          cp "$BAZEL_BIN/armorstand/mod_fabric.jar" dist/ArmorStand-fabric.jar
          cp "$BAZEL_BIN/armorstand/mod_neoforge.jar" dist/ArmorStand-neoforge.jar
          cp "$BAZEL_BIN/blazerod/blazerod_fabric.jar" dist/BlazeRod-fabric.jar
          cp "$BAZEL_BIN/blazerod/blazerod_neoforge.jar" dist/BlazeRod-neoforge.jar
          
          # Copy models
          cp "$BAZEL_BIN/blazerod/model/model-base/model-base.jar" dist/
          cp "$BAZEL_BIN/blazerod/model/model-formats/model-formats.jar" dist/
          cp "$BAZEL_BIN/blazerod/model/model-gltf/model-gltf.jar" dist/
          cp "$BAZEL_BIN/blazerod/model/model-pmd/model-pmd.jar" dist/
          cp "$BAZEL_BIN/blazerod/model/model-pmx/model-pmx.jar" dist/
          cp "$BAZEL_BIN/blazerod/model/model-vmd/model-vmd.jar" dist/
          cp "$BAZEL_BIN/blazerod/model/model-assimp/model-assimp-merged.jar" dist/
          cp "$BAZEL_BIN/blazerod/example/ball_block/ball_block.jar" dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-bazel
          path: dist/
