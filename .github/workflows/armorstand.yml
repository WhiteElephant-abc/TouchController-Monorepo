name: Build ArmorStand and BlazeRod
on: [pull_request, push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r28b
      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.14.0
      - name: Build
        run: |
          bazel build \
            -c opt \
            --verbose_failures \
            //armorstand:mod_fabric \
            //armorstand:mod_neoforge \
            //blazerod:blazerod_fabric \
            //blazerod:blazerod_neoforge \
            //blazerod/model/model-base \
            //blazerod/model/model-formats \
            //blazerod/model/model-gltf \
            //blazerod/model/model-pmd \
            //blazerod/model/model-pmx \
            //blazerod/model/model-vmd \
            //blazerod/model/model-assimp:model-assimp-merged \
            //blazerod/example/ball_block
      - name: Test
        run: |
          bazel test \
            --verbose_failures \
            //blazerod/model:test \
            //blazerod/render:test
      - name: Locate Artifacts
        run: |
          echo "Bazel Bin Info:"
          bazel info bazel-bin
          echo "Searching for mod_*.jar:"
          find bazel-bin -name "mod_*.jar"
          echo "Searching for blazerod_*.jar:"
          find bazel-bin -name "blazerod_*.jar"
          echo "Listing armorstand directory:"
          ls -R bazel-bin/armorstand || echo "armorstand dir not found"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-bazel
          if-no-files-found: error
          path: |
            bazel-bin/armorstand/mod_*.jar
            bazel-bin/blazerod/blazerod_*.jar
            bazel-bin/blazerod/model/model-*/*.jar
            bazel-bin/blazerod/example/ball_block/*.jar
